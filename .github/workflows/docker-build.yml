name: Docker Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Dockerfile exists
        run: |
          if [ -f "deployment/docker/Dockerfile.api" ]; then
            echo "Dockerfile.api found"
          else
            echo "Dockerfile not found - skipping build"
            exit 0
          fi

      - name: Build Docker image (dry run)
        run: |
          if [ -f "deployment/docker/Dockerfile.api" ]; then
            docker build \
              -f deployment/docker/Dockerfile.api \
              -t aases-api:test \
              . || echo "Docker build skipped"
          fi