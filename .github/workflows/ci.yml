name: AASES CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Tesseract
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install opencv-python-headless pytesseract numpy pandas pillow

      - name: Verify core imports
        run: |
          python -c "from src.preprocessing.image_cleaner import ImageCleaner; print('OK: ImageCleaner')"
          python -c "from src.ocr.tesseract_engine import TesseractEngine; print('OK: TesseractEngine')"
          python -c "from src.ocr.ocr_ensemble import OCREnsemble; print('OK: OCREnsemble')"

      - name: Run tests (if any)
        run: |
          pip install pytest
          python -m pytest tests/ -v --tb=short || echo "No tests found - skipping"